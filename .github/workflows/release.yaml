name: Release on manifest version bump
on:
  push:
    branches: [main]
    paths: ["custom_components/bsport/manifest.json"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - id: version
        run: |
          v=$(python -c "import json; print(json.load(open('custom_components/bsport/manifest.json'))['version'])")
          echo "tag=v$v" >> "$GITHUB_OUTPUT"
      - id: tag_check
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.tag_check.outputs.exists == 'false'
        run: |
          cd custom_components/bsport
          zip -r "$GITHUB_WORKSPACE/bsport.zip" .
      - if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: bsport.zip
